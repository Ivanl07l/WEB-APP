<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Landing App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container mt-5">

    <!-- 1️⃣ Imagen -->
    <div class="mb-3">
        <label class="form-label">Subir Imagen</label>
        <input type="file" class="form-control" id="imageInput" accept="image/*">
    </div>

    <!-- 2️⃣ Título -->
    <div class="mb-3">
        <label class="form-label">Título</label>
        <input type="text" class="form-control" id="titleInput" placeholder="Escribe el título">
    </div>

    <!-- 3️⃣ Descripciones -->
    <div class="mb-3">
        <label class="form-label">Descripción</label>
        <div id="descriptionContainer">
            <input type="text" class="form-control mb-2 descriptionInput" placeholder="Escribe una descripción">
        </div>
        <button class="btn btn-outline-primary btn-sm" id="addDescriptionBtn">
            + Agregar otra descripción
        </button>
    </div>

    <!-- 4️⃣ Botón Agregar -->
    <div class="mb-5">
        <button class="btn btn-success w-100" id="submitBtn">
            Agregar
        </button>
    </div>

    <!-- Resultado -->
    <div id="resultSection" class="card p-4 d-none">
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <img id="resultImage" class="img-fluid rounded-image">
            </div>
            <div class="col-md-8">
                <h3 id="resultTitle"></h3>
                <ul id="resultDescriptions" class="list-unstyled"></ul>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
